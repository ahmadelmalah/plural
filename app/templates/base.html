<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Plural{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-indigo-600">Plural</a>
                </div>
                <div class="flex items-center space-x-4">
                    {% if user %}
                        <a href="/dashboard" class="text-gray-600 hover:text-gray-900">Dashboard</a>
                        <a href="/u/{{ user.username }}" class="text-gray-600 hover:text-gray-900">My Profile</a>
                        <a href="/logout" class="text-gray-600 hover:text-gray-900">Logout</a>
                    {% else %}
                        <a href="/login" class="text-gray-600 hover:text-gray-900">Login</a>
                        <a href="/signup" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Sign Up</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% if flash_message %}
            <div class="mb-4 p-4 rounded-lg {% if flash_type == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                {{ flash_message }}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="border-t mt-auto py-6">
        <div class="max-w-6xl mx-auto px-4 text-center text-gray-500 text-sm">
            Plural - Manage your multidimensional digital identity
        </div>
    </footer>
</body>
</html>
