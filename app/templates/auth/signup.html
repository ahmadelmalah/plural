{% extends "base.html" %}

{% block title %}Sign Up - Plural{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white p-8 rounded-xl shadow-sm border">
        <h2 class="text-2xl font-bold text-center mb-6">Create Your Account</h2>

        {% if error %}
            <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required minlength="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="johndoe"
                    value="{{ username or '' }}">
                <p class="mt-1 text-xs text-gray-500">This will be your profile URL: plural.com/u/username</p>
            </div>

            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="you@example.com"
                    value="{{ email or '' }}">
            </div>

            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required minlength="6"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="At least 6 characters">
            </div>

            <button type="submit"
                class="w-full py-2 px-4 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Create Account
            </button>
        </form>

        <div class="mt-6 flex items-center">
            <div class="flex-1 border-t border-gray-300"></div>
            <span class="px-3 text-sm text-gray-500">or</span>
            <div class="flex-1 border-t border-gray-300"></div>
        </div>

        <a href="/signup/cognito"
            class="mt-4 w-full py-2 px-4 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5zm0 2.18l7 3.89v4.27c0 4.54-3.08 8.79-7 9.95-3.92-1.16-7-5.41-7-9.95V8.07l7-3.89z" fill="#FF9900"/>
                <path d="M12 6.5L7 9.3v3.2c0 3.18 2.16 6.16 5 6.98 2.84-.82 5-3.8 5-6.98V9.3L12 6.5z" fill="#FF9900" opacity="0.4"/>
            </svg>
            Continue with AWS Cognito
        </a>

        <p class="mt-6 text-center text-sm text-gray-600">
            Already have an account? <a href="/login" class="text-indigo-600 hover:text-indigo-700 font-medium">Login</a>
        </p>
    </div>
</div>
{% endblock %}
