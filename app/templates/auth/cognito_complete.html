{% extends "base.html" %}

{% block title %}Choose Username - Plural{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white p-8 rounded-xl shadow-sm border">
        <h2 class="text-2xl font-bold text-center mb-2">Almost There!</h2>
        <p class="text-center text-sm text-gray-600 mb-6">Choose a username for your Plural profile.</p>

        {% if error %}
            <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/auth/cognito/complete">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="text" disabled
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500"
                    value="{{ email }}">
            </div>

            <div class="mb-6">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required minlength="3" maxlength="100"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="johndoe"
                    value="{{ username or '' }}">
                <p class="mt-1 text-xs text-gray-500">This will be your profile URL: plural.com/u/username</p>
            </div>

            <button type="submit"
                class="w-full py-2 px-4 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Complete Sign Up
            </button>
        </form>
    </div>
</div>
{% endblock %}
